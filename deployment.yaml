apiVersion: apps/v1
kind: Deployment
metadata:
  name: reactapp-ui
spec:
  replicas: 3
  selector:
    matchLabels:
      app: reactapp-ui
  template:
    metadata:
      labels:
        app: reactapp-ui
    spec:
      containers:
      - name: reactapp-ui
        image: eric7767/reactapp-ui:bd0b341b0800ea620e5b6fcb93347351247fb3ef
        ports:
        - containerPort: 80