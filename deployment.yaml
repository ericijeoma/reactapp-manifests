apiVersion: apps/v1
kind: Deployment
metadata:
  name: reactapp-ui
spec:
  replicas: 3
  selector:
    matchLabels:
      app: reactapp-ui
  template:
    metadata:
      labels:
        app: reactapp-ui
    spec:
      containers:
      - name: reactapp-ui
        image: sachinlakshan/reactapp-ui:5cf09679d83608e4e2a09e1b958eb1f063cd0171
        ports:
        - containerPort: 80